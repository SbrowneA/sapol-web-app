# Required repository secrets: GitHub → Settings → Secrets and variables → Actions
#   VITE_MAPTILER_KEY   — MapTiler key (inlined at build; restrict referrer/URL in MapTiler Cloud)
#   VITE_API_BASE_URL   — optional; set if CI builds should target your production API base URL

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_MAPTILER_KEY: ${{ secrets.VITE_MAPTILER_KEY }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
