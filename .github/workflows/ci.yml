# Required repository secrets: GitHub → Settings → Secrets and variables → Actions
#   VITE_MAPTILER_KEY              — MapTiler key (inlined at build; restrict referrer/URL in MapTiler Cloud)
#   VITE_SUPABASE_URL               — Supabase project URL
#   VITE_SUPABASE_PUBLISHABLE_KEY   — Supabase publishable key (public)

name: CI checks

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_MAPTILER_KEY: ${{ secrets.VITE_MAPTILER_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
